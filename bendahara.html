<style>
*{box-sizing:border-box;}
body{margin:0;font-family:'Poppins',sans-serif;background:radial-gradient(circle at top,#2a5298,#0f2027);color:white;min-height:100vh;}
header{text-align:center;padding:25px;font-size:30px;font-weight:700;}
.container{max-width:1000px;margin:auto;padding:20px;}

button{background:#f3c969;color:#1f2d3d;border:none;padding:14px;margin:1px 0;width:100%;border-radius:18px;font-weight:bold;font-size:13px;cursor:pointer;transition:0.25s ease;}
button:hover{background:#e6b85c;transform:scale(1.02);}
button:active{transform:scale(0.97);}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #fff;padding:8px;text-align:center;}
td[contenteditable]{background:rgba(255,255,255,0.1);}
.card{display:none;background:rgba(255,255,255,.15);padding:25px;border-radius:20px;margin-bottom:20px;}
.card.active-card{display:block !important;}
.result{text-align:center;margin-top:10px;font-size:18px;color:#ffeb99;}
.footer-wrapper{text-align:center;padding:15px 0;margin-top:25px;opacity:0.7;font-size:14px;}
.badge{display:inline-flex;align-items:center;justify-content:center;background:#fbbf24;color:#111;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600;margin-top:18px;box-shadow:0 6px 15px rgba(0,0,0,.25);}
.mode-btn{width:100%;max-width:350px;padding:14px;margin:20px auto;display:block;background:#eec36d;color:#000000;border:none;border-radius:20px;font-size:13px;font-weight:bold;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.15);}
.mode-btn:active{transform:scale(0.97);}
body.light{background:radial-gradient(circle at top,#f0f0f0,#dcdcdc);color:#111;}
body.dark{background:radial-gradient(circle at top,#2a5298,#0f2027);color:#fff;}
.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.table-wrapper{
  width: 100%;
  overflow-x: auto;  
}

table{
  border-collapse: collapse;
  min-width: 800px; 
}
button {
  background: #f3c969;
  color: #1f2d3d;
  border: none;
  padding: 14px;
  margin: -5px 0;
  width: 100%;
  border-radius: 18px;
  font-weight: bold;
  font-size: 13px;
  cursor: pointer;
  transition: 0.25s ease;
}

button:hover {
  background: #e6b85c;
  transform: scale(1.02);
}

button:active {
  transform: scale(0.97);
}
.card button {
  margin: 10px 0;
}

.menu-btn {
  width: 100%;
  max-width: 350px;
  padding: 14px;
  margin: 12px auto; 
  display: block;
  background: #ffffff;
  color: #1f3c88;
  border: none;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
  transition: all 0.2s ease;
}

.menu-btn:hover {
  transform: translateY(-2px);
}

.menu-btn:active {
  transform: scale(0.97);
}
</style>
</head>

  <input type="text" id="kelasName" placeholder="Nama Kelas">

  <button onclick="loginKelas()">Masuk</button>

<!-- DASHBOARD -->
<div class="card" id="dashboardCard">

  </select>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// Mode Gelap/Terang
document.getElementById('modeToggle').addEventListener('click', ()=>{
  document.body.classList.toggle('dark');
  document.body.classList.toggle('light');
});

// Show Card
function showCard(id){
  document.querySelectorAll('.card').forEach(c=>c.style.display='none');
  document.getElementById(id).style.display='block';
}

// ======= FIREBASE CONFIG =======
const firebaseConfig = {
 apiKey: "AIzaSyA7foZX8BpYVX6JC1rOpTRiKOuCpmL8BPc",
 authDomain: "absensi-bintang-586a1.firebaseapp.com",
 databaseURL: "https://absensi-bintang-586a1-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId: "absensi-bintang-586a1",
 storageBucket: "absensi-bintang-586a1.appspot.com",
 messagingSenderId: "805938764052",
 appId: "1:805938764052:web:a59bf3afc8176308ea8a01",
 measurementId: "G-NQ8DFVNBN1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ======= GLOBAL =======
let kelasRef = null;
let siswa = [];

// ======= LOGIN =======
function loginKelas(){
  const namaInput = document.getElementById("kelasName").value.trim();
  const pwInput = document.getElementById("kelasPW").value.trim();

  // cek localStorage dulu
  const stored = JSON.parse(localStorage.getItem("kelasLogin"));
  if(stored){
    document.getElementById("kelasName").value = stored.nama;
    document.getElementById("kelasPW").value = stored.pw;
  }

  const nama = namaInput || stored?.nama;
  const pw = pwInput || stored?.pw;

  if(!nama || !pw) return alert("Isi semua kolom!");

  kelasRef = db.ref("kelas/"+nama);
  kelasRef.once("value", snap=>{
    const data = snap.val();
    if(!data || data.password!==pw) return alert("Kelas/Password salah!");

    // simpan ke localStorage
    localStorage.setItem("kelasLogin", JSON.stringify({nama,pw}));

    document.getElementById("loginCard").style.display="none";
    document.getElementById("dashboardCard").style.display="block";
    loadSiswa();
  });
}

// ======= LOAD SISWA =======
function loadSiswa(){
  kelasRef.child("siswa").once("value", snap=>{
    siswa=[];
    snap.forEach(child=>{
      siswa.push({id:child.key, ...child.val()});
    });
    renderTable();
  });
}

// ======= GET ALL MONDAYS =======
function getMondays(month, year){
  let d = new Date(year, month, 1);
  let mondays = [];
  while(d.getMonth()===month){
    if(d.getDay()===1) mondays.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  return mondays;
}

// ======= TAMBAH BARIS SISWA =======
function tambahBaris() {
  const input = document.getElementById("tambahmurid");
  const namaBaru = input.value.trim();
  if (!namaBaru) return alert("Isi nama siswa dulu!");

  // Tambah ke Firebase
  const siswaRef = kelasRef.child("siswa/" + namaBaru);
  siswaRef.once("value", snap => {
    if (snap.exists()) return alert("Siswa sudah ada!");
    siswaRef.set({ nama: namaBaru, pembayaran: {} }, () => {
      input.value = "";
      loadSiswa(); // reload data dari Firebase supaya tabel update
    });
  });
}

// ======= RENDER TABEL DENGAN TOMBOL HAPUS =======
function renderTable(){
  const bulan = parseInt(document.getElementById("bulan").value);
  const tahun = parseInt(document.getElementById("tahun").value);
  const mondays = getMondays(bulan, tahun);
  const container = document.getElementById("tabelContainer");
  
  let html=`<table><thead><tr><th>No</th><th>Nama</th>`;
  mondays.forEach(d=>{
    html+=`<th>${d.getDate()}</th>`;
  });
  html+="<th>Aksi</th></tr></thead><tbody>";
  
  siswa.forEach((s,i)=>{
    html+=`<tr>
      <td>${i+1}</td>
      <td contenteditable="true" data-siswa="${i}" class="namaSiswa">${s.nama||""}</td>`;
    mondays.forEach(d=>{
      const key=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
      const val = s.pembayaran?.[key]||"";
      html+=`<td contenteditable="true" data-siswa="${i}" data-tanggal="${key}">${val}</td>`;
    });
    html+=`<td><button onclick="hapusSiswa('${s.nama}')">Hapus</button></td>`;
    html+="</tr>";
  });
  
  html+="</tbody></table>";
  container.innerHTML=html;
}

// ======= HAPUS SISWA =======
function hapusSiswa(nama){
  if(!confirm(`Yakin mau hapus siswa ${nama}?`)) return;
  kelasRef.child("siswa/"+nama).remove(()=>{
    loadSiswa(); // reload tabel setelah hapus
  });
}

// ======= RESET BULAN =======
function resetBulan(){
  siswa.forEach(s=>{
    s.pembayaran={};
  });
  renderTable();
}

// ======= LOGOUT =======
function logout(){
  kelasRef=null;
  siswa=[];
  localStorage.removeItem("kelasLogin"); // hapus login
  document.getElementById("dashboardCard").style.display="none";
  document.getElementById("loginCard").style.display="block";
}

// ======= AUTO LOGIN JIKA ADA LOCALSTORAGE =======
window.onload = ()=>{
  const stored = JSON.parse(localStorage.getItem("kelasLogin"));
  if(stored){
    document.getElementById("kelasName").value = stored.nama;
    document.getElementById("kelasPW").value = stored.pw;
    loginKelas();
  }
  // dropdown otomatis update setelah siswa load
  setTimeout(loadSiswaDropdown, 1000);
};

// ======= SIMPAN OTOMATIS KE FIREBASE SAAT EDIT TABEL =======
document.addEventListener("input", function(e){
  const target = e.target;
  
  // Update nominal di tanggal
  if(target.tagName==="TD" && target.dataset.siswa!==undefined && target.dataset.tanggal){
    const i = parseInt(target.dataset.siswa);
    const key = target.dataset.tanggal;
    const val = parseInt(target.innerText) || 0;

    const siswaId = siswa[i].id;

    // update local object
    if(!siswa[i].pembayaran) siswa[i].pembayaran = {};
    siswa[i].pembayaran[key] = val;

    // update Firebase
    kelasRef.child(`siswa/${siswaId}/pembayaran/${key}`).set(val, ()=>{
      console.log(`Update ${siswa[i].nama} tanggal ${key}: ${val}`);
    });
  }

  // Update nama siswa
  if(target.tagName==="TD" && target.classList.contains("namaSiswa") && target.dataset.siswa!==undefined){
    const i = parseInt(target.dataset.siswa);
    const val = target.innerText.trim() || "Siswa";
    const oldId = siswa[i].id;
    siswa[i].nama = val;
    siswa[i].id = val; // pakai nama baru sebagai key

    // Update Firebase
    // Hapus data lama, pindahkan ke key baru
    kelasRef.child(`siswa/${oldId}`).once("value", snap=>{
      const data = snap.val();
      kelasRef.child(`siswa/${oldId}`).remove(()=>{
        kelasRef.child(`siswa/${val}`).set(data, ()=>{
          console.log(`Nama siswa update: ${val}`);
        });
      });
    });
  }
});

// Logout Bendahara 
function logoutBendahara() {
  localStorage.removeItem("profil");       // Hapus profil
  localStorage.removeItem("kelasAktif");   // Hapus kelas aktif
  localStorage.removeItem("pwAktif");      // Hapus password aktif
  window.location.href = "index.html";     // Redirect ke index
}
</script>
