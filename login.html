<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - Star Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CARD */
.container {
  width: 90%;
  max-width: 350px;
  background: #000;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* TITLE */
h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 92%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #1e1e1e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:active {
  transform: scale(0.97);
}

/* SWITCH */
.switch {
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
  cursor: pointer;
  color: #aaa;
}

.switch span {
  color: #4fc3f7;
}

</style>
</head>

<body>


<div class="container">

  <h2 id="title">Login Star Tools</h2>

  <input type="text" id="username" placeholder="Username" style="display:none;">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button id="actionBtn" onclick="login()">Login</button>

  <div class="switch" onclick="toggleMode()">
    Belum punya akun? <span>Daftar</span>
  </div>

<div class="switch" onclick="skipLogin()">
  Lewati login (Masuk sebagai Guest)
</div>

</div>


<div id="customAlert" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
  <div style="background: #000; padding:20px; border-radius:10px; width:80%; max-width:300px; text-align:center;">
    <p id="alertMsg" style="color:white; margin-bottom:20px;"></p>
    <button onclick="closeCustomAlert()" style="background:#1e1e1e; color:white; border:none; padding:10px; border-radius:8px; width:100%; cursor:pointer;">
      OK
    </button>
  </div>
</div>

<script>
// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDgr_nHqvpMsiG4lBkYckzxRErkskXj_6E",
  authDomain: "laporanstartools-c18b2.firebaseapp.com",
  databaseURL: "https://laporanstartools-c18b2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "laporanstartools-c18b2",
  storageBucket: "laporanstartools-c18b2.firebasestorage.app",
  messagingSenderId: "596585220522",
  appId: "1:596585220522:web:d61e13c60daff6daca43d3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let isLogin = true;

// AUTO REDIRECT
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    window.location.href = "index.html";
  }
});

// SWITCH LOGIN / SIGNUP
function toggleMode() {
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Daftar";
  document.getElementById("actionBtn").innerText = isLogin ? "Login" : "Daftar";

  document.getElementById("username").style.display = isLogin ? "none" : "block";

  document.querySelector(".switch").innerHTML = isLogin
    ? 'Belum punya akun? <span>Daftar</span>'
    : 'Sudah punya akun? <span>Login</span>';
}

// SIGNUP
function signup() {
  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !email || !password) {
    showCustomAlert("Harap Isi Semua Data!");
    return;
  }

  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(res => {
      const uid = res.user.uid;

      return db.ref("users/" + uid).set({
        username: username,
        email: email,
        premium: false,
        createdAt: Date.now()
      });
    })
.then(() => {
  const redirect = localStorage.getItem("redirectAfterLogin");

  if(redirect){
    localStorage.removeItem("redirectAfterLogin");
    window.location.href = redirect;
  } else {
    window.location.href = "index.html";
  }
})
    .catch(err => showCustomAlert(err.message));
}


// LOGIN
function login() {
  if (!isLogin) {
    signup();
    return;
  }

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      window.location.href = "index.html";
    })
    .catch(err => showCustomAlert(err.message));
}


// ALERT CUSTOM
function showCustomAlert(text) {
  document.getElementById("alertMsg").innerText = text;
  document.getElementById("customAlert").style.display = "flex";
}

function closeCustomAlert() {
  document.getElementById("customAlert").style.display = "none";
}

function skipLogin(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
